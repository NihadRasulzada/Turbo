# =====================================================
# Turbo - Docker Compose (Development)
# Qaldırır: command-db, query-db, replication-setup, redis, rabbitmq, minio
# API yerli (lokal) işləyir → servislərə localhost üzərindən qoşulur
#
# Network topologiyası:
#   command-db-net → command-db, replication-setup
#   query-db-net   → query-db,   replication-setup
#   cache-net      → redis
#   messaging-net  → rabbitmq
#   storage-net    → minio
#   api-net        → (API lokal işləyir, gələcək containerləşmə üçün ayrılıb)
# =====================================================

name: turbo-dev

services:

  # ── Command DB (Write / Publisher) ──────────────────
  command-db:
    image: postgres:16-alpine
    container_name: turbo-command-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COMMAND_DB_NAME:-turbo_command}
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD:-turbo_password}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD:-replicator_password}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    volumes:
      - command_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-init-replication.sh:/docker-entrypoint-initdb.d/01-init-replication.sh:ro
    ports:
      - "${COMMAND_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMMAND_DB_USER:-turbo} -d ${COMMAND_DB_NAME:-turbo_command}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - command-db-net

  # ── Query DB (Read / Subscriber) ────────────────────
  query-db:
    image: postgres:16-alpine
    container_name: turbo-query-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${QUERY_DB_NAME:-turbo_query}
      POSTGRES_USER: ${QUERY_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${QUERY_DB_PASSWORD:-turbo_password}
      QUERY_READER_PASSWORD: ${QUERY_READER_PASSWORD:-turbo_reader_password}
    volumes:
      - query_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init/query-db/01-init-reader.sh:/docker-entrypoint-initdb.d/01-init-reader.sh:ro
    ports:
      - "${QUERY_DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUERY_DB_USER:-turbo} -d ${QUERY_DB_NAME:-turbo_query}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - query-db-net

  # ── Replication Setup (one-shot) ────────────────────
  # Hər iki DB-yə çatmalıdır → hər iki networkda olur
  replication-setup:
    image: postgres:16-alpine
    container_name: turbo-replication-setup
    restart: on-failure
    environment:
      COMMAND_DB_HOST: command-db
      COMMAND_DB_PORT: 5432
      QUERY_DB_HOST: query-db
      QUERY_DB_PORT: 5432
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD:-turbo_password}
      COMMAND_DB_NAME: ${COMMAND_DB_NAME:-turbo_command}
      QUERY_DB_NAME: ${QUERY_DB_NAME:-turbo_query}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD:-replicator_password}
    volumes:
      - ./docker/postgres/init/02-setup-replication.sh:/setup-replication.sh:ro
    entrypoint: ["/bin/sh", "/setup-replication.sh"]
    depends_on:
      command-db:
        condition: service_healthy
      query-db:
        condition: service_healthy
    networks:
      - command-db-net
      - query-db-net

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: turbo-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-turbo_redis_password}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-turbo_redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cache-net

  # ── RabbitMQ ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: turbo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-turbo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-turbo_rabbit_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-turbo}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - messaging-net

  # ── MinIO ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: turbo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-turbo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-turbo_minio_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"         # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - storage-net

volumes:
  command_db_data:
    driver: local
  query_db_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  api-net:
    driver: bridge
    name: turbo-dev-api-net
  command-db-net:
    driver: bridge
    name: turbo-dev-command-db-net
  query-db-net:
    driver: bridge
    name: turbo-dev-query-db-net
  cache-net:
    driver: bridge
    name: turbo-dev-cache-net
  messaging-net:
    driver: bridge
    name: turbo-dev-messaging-net
  storage-net:
    driver: bridge
    name: turbo-dev-storage-net