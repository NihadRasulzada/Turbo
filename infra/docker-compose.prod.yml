# =====================================================
# Turbo - Docker Compose (Production)
# Qaldırır: turbo-api, command-db, query-db, replication-setup
# İşlətmə: docker compose -f docker-compose.prod.yml --env-file env/.env.prod up -d
# =====================================================

name: turbo-prod

services:

  # ── Turbo API ────────────────────────────────────────
  turbo-api:
    image: turbo-api:latest
    build:
      context: ..          # repo root (Turbo.slnx ilə eyni səviyyə)
      dockerfile: infra/docker/Dockerfile
    container_name: turbo-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__CommandDb: "Host=${COMMAND_DB_HOST};Port=${COMMAND_DB_PORT};Database=${COMMAND_DB_NAME};Username=${COMMAND_DB_USER};Password=${COMMAND_DB_PASSWORD}"
      ConnectionStrings__QueryDb: "Host=${QUERY_DB_HOST};Port=${QUERY_DB_PORT};Database=${QUERY_DB_NAME};Username=${QUERY_DB_USER};Password=${QUERY_DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "8080:8080"
    depends_on:
      command-db:
        condition: service_healthy
      query-db:
        condition: service_healthy
      replication-setup:
        condition: service_completed_successfully
    networks:
      - turbo-net

  # ── Command DB (Write / Publisher) ──────────────────
  command-db:
    image: postgres:16-alpine
    container_name: turbo-command-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COMMAND_DB_NAME:-turbo_command}
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    volumes:
      - command_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-init-replication.sql:/docker-entrypoint-initdb.d/01-init-replication.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMMAND_DB_USER:-turbo} -d ${COMMAND_DB_NAME:-turbo_command}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - turbo-net

  # ── Query DB (Read / Subscriber) ────────────────────
  query-db:
    image: postgres:16-alpine
    container_name: turbo-query-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${QUERY_DB_NAME:-turbo_query}
      POSTGRES_USER: ${QUERY_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${QUERY_DB_PASSWORD}
    volumes:
      - query_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUERY_DB_USER:-turbo} -d ${QUERY_DB_NAME:-turbo_query}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - turbo-net

  # ── Replication Setup (one-shot) ────────────────────
  replication-setup:
    image: postgres:16-alpine
    container_name: turbo-replication-setup
    restart: on-failure
    environment:
      COMMAND_DB_HOST: command-db
      COMMAND_DB_PORT: 5432
      QUERY_DB_HOST: query-db
      QUERY_DB_PORT: 5432
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD}
      COMMAND_DB_NAME: ${COMMAND_DB_NAME:-turbo_command}
      QUERY_DB_NAME: ${QUERY_DB_NAME:-turbo_query}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - ./docker/postgres/init/02-setup-replication.sh:/setup-replication.sh:ro
    entrypoint: ["/bin/sh", "/setup-replication.sh"]
    depends_on:
      command-db:
        condition: service_healthy
      query-db:
        condition: service_healthy
    networks:
      - turbo-net

volumes:
  command_db_data:
    driver: local
  query_db_data:
    driver: local

networks:
  turbo-net:
    driver: bridge