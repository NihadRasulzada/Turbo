# =====================================================
# Turbo - Docker Compose (Production)
# Qaldırır: turbo-api, command-db, query-db, replication-setup, redis, rabbitmq, minio
# İşlətmə: docker compose -f docker-compose.prod.yml --env-file env/.env.prod up -d
#
# Network topologiyası:
#   api-net        → turbo-api
#   command-db-net → command-db, replication-setup, turbo-api
#   query-db-net   → query-db,   replication-setup, turbo-api
#   cache-net      → redis,      turbo-api
#   messaging-net  → rabbitmq,   turbo-api
#   storage-net    → minio,      turbo-api
# =====================================================

name: turbo-prod

services:

  # ── Turbo API ────────────────────────────────────────
  # Hər dörd networkda olur — bütün servislərə çatmalıdır
  turbo-api:
    image: turbo-api:latest
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: turbo-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__CommandDb: "Host=${COMMAND_DB_HOST};Port=${COMMAND_DB_PORT};Database=${COMMAND_DB_NAME};Username=${COMMAND_DB_USER};Password=${COMMAND_DB_PASSWORD}"
      ConnectionStrings__QueryDb: "Host=${QUERY_DB_HOST};Port=${QUERY_DB_PORT};Database=${QUERY_DB_NAME};Username=${QUERY_DB_USER};Password=${QUERY_DB_PASSWORD}"
      ConnectionStrings__Redis: "${REDIS_HOST:-redis}:${REDIS_PORT:-6379},password=${REDIS_PASSWORD},abortConnect=false"
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-turbo}
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "8080:8080"
    depends_on:
      command-db:
        condition: service_healthy
      query-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      replication-setup:
        condition: service_completed_successfully
    networks:
      - api-net
      - command-db-net
      - query-db-net
      - cache-net
      - messaging-net
      - storage-net

  # ── Command DB (Write / Publisher) ──────────────────
  command-db:
    image: postgres:16-alpine
    container_name: turbo-command-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COMMAND_DB_NAME:-turbo_command}
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    volumes:
      - command_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-init-replication.sh:/docker-entrypoint-initdb.d/01-init-replication.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMMAND_DB_USER:-turbo} -d ${COMMAND_DB_NAME:-turbo_command}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - command-db-net

  # ── Query DB (Read / Subscriber) ────────────────────
  query-db:
    image: postgres:16-alpine
    container_name: turbo-query-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${QUERY_DB_NAME:-turbo_query}
      POSTGRES_USER: ${QUERY_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${QUERY_DB_PASSWORD}
    volumes:
      - query_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUERY_DB_USER:-turbo} -d ${QUERY_DB_NAME:-turbo_query}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - query-db-net

  # ── Replication Setup (one-shot) ────────────────────
  # Hər iki DB-yə çatmalıdır → hər iki networkda olur
  replication-setup:
    image: postgres:16-alpine
    container_name: turbo-replication-setup
    restart: on-failure
    environment:
      COMMAND_DB_HOST: command-db
      COMMAND_DB_PORT: 5432
      QUERY_DB_HOST: query-db
      QUERY_DB_PORT: 5432
      POSTGRES_USER: ${COMMAND_DB_USER:-turbo}
      POSTGRES_PASSWORD: ${COMMAND_DB_PASSWORD}
      COMMAND_DB_NAME: ${COMMAND_DB_NAME:-turbo_command}
      QUERY_DB_NAME: ${QUERY_DB_NAME:-turbo_query}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    volumes:
      - ./docker/postgres/init/02-setup-replication.sh:/setup-replication.sh:ro
    entrypoint: ["/bin/sh", "/setup-replication.sh"]
    depends_on:
      command-db:
        condition: service_healthy
      query-db:
        condition: service_healthy
    networks:
      - command-db-net
      - query-db-net

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: turbo-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cache-net

  # ── RabbitMQ ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: turbo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-turbo}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - messaging-net

  # ── MinIO ─────────────────────────────────────────────
  # Prod-da Console UI xarici porta açılmır (təhlükəsizlik)
  minio:
    image: minio/minio:latest
    container_name: turbo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - storage-net

volumes:
  command_db_data:
    driver: local
  query_db_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  api-net:
    driver: bridge
    name: turbo-prod-api-net
  command-db-net:
    driver: bridge
    name: turbo-prod-command-db-net
  query-db-net:
    driver: bridge
    name: turbo-prod-query-db-net
  cache-net:
    driver: bridge
    name: turbo-prod-cache-net
  messaging-net:
    driver: bridge
    name: turbo-prod-messaging-net
  storage-net:
    driver: bridge
    name: turbo-prod-storage-net